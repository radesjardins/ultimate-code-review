# =============================================================================
# Ultimate Code Review Configuration (.ucrconfig.yml)
# =============================================================================
#
# Copy this file to your repository root as .ucrconfig.yml
#
# All settings are optional. When omitted, sensible defaults are used.
# Commented-out entries show the default values or example configurations.
#
# This file is read at the start of every UCR run. Changes take effect
# immediately on the next review.
# =============================================================================


# -----------------------------------------------------------------------------
# Exclude Paths
# -----------------------------------------------------------------------------
# Glob patterns for files and directories to skip during review.
# These paths will not be analyzed and will not generate findings.
# They are disclosed in the report's "Exclusions" section for transparency.
#
# Common exclusions: vendored code, generated files, build output, minified
# assets, and legacy code that is being replaced.
#
# Use forward slashes for path separators, even on Windows.

exclude_paths:
  # - "vendor/**"              # Third-party vendored dependencies
  # - "node_modules/**"        # npm packages (typically excluded by default)
  # - "generated/**"           # Auto-generated code (protobuf, GraphQL, etc.)
  # - "*.min.js"               # Minified JavaScript bundles
  # - "*.min.css"              # Minified CSS bundles
  # - "dist/**"                # Build output directory
  # - "coverage/**"            # Test coverage reports
  # - "legacy/**"              # Legacy code scheduled for removal
  # - "**/*.snap"              # Jest snapshots
  # - "migrations/00*.sql"     # Old migrations that are already deployed


# -----------------------------------------------------------------------------
# Accepted Risks
# -----------------------------------------------------------------------------
# Findings that are acknowledged and intentional. These represent conscious
# trade-offs that the team has evaluated and accepted.
#
# Accepted risks WILL still appear in the report — they are listed in the
# "Accepted Risks" section for auditability. However, they will NOT affect
# the release verdict or blocker count.
#
# IMPORTANT: Every accepted risk must have an expiry date. When the expiry
# date passes, the risk will be flagged in the report as "expired" and will
# once again count toward the verdict. This ensures accepted risks are
# periodically re-evaluated rather than forgotten.
#
# Fields:
#   id            (required) Unique identifier for this risk. Use kebab-case.
#   description   (required) What the risk is — the specific code behavior
#                            that would normally be flagged.
#   justification (required) Why this risk is acceptable — what mitigations
#                            exist or why the trade-off is worth it.
#   owner         (required) Team or person responsible for this risk.
#   reviewed_date (required) Date the risk was last reviewed (ISO 8601).
#   expires       (required) Date the risk must be re-evaluated (ISO 8601).
#                            Reports generated after this date will flag
#                            the risk as expired.
#   finding_match (optional) Pattern to match against finding titles or
#                            categories. If omitted, the risk must be
#                            manually linked to findings during review.

accepted_risks:
  # - id: "eval-plugin-system"
  #   description: "We use eval() to execute plugin code in the plugin runtime"
  #   justification: "Plugin input is validated against an allowlist schema and executed in a sandboxed V8 isolate with no filesystem or network access"
  #   owner: "security-team"
  #   reviewed_date: "2026-01-15"
  #   expires: "2026-07-15"
  #   finding_match: "eval"

  # - id: "http-internal-api"
  #   description: "Internal service-to-service API uses HTTP without TLS"
  #   justification: "Services communicate over a private VPC network with no external ingress. TLS termination happens at the load balancer for external traffic."
  #   owner: "platform-team"
  #   reviewed_date: "2026-02-01"
  #   expires: "2026-08-01"

  # - id: "known-cve-libfoo"
  #   description: "libfoo v2.3.1 has CVE-2025-12345 (medium severity)"
  #   justification: "The vulnerable code path (XML parsing) is not used in our integration. Upgrade blocked until libfoo v3.0 is released with breaking API changes."
  #   owner: "backend-team"
  #   reviewed_date: "2026-03-01"
  #   expires: "2026-06-01"


# -----------------------------------------------------------------------------
# Custom Rules
# -----------------------------------------------------------------------------
# Project-specific review rules that supplement the built-in review logic.
# Use these to enforce team conventions or catch project-specific anti-patterns.
#
# Fields:
#   name      (required) Human-readable rule name.
#   pattern   (required) Glob pattern for files this rule applies to.
#   check     (required) What to check for. Built-in checks:
#                        - "no-raw-sql"      Flag raw SQL string construction
#                        - "no-console-log"   Flag console.log in production code
#                        - "no-any-type"      Flag TypeScript 'any' usage
#                        - "no-hardcoded-url" Flag hardcoded URLs/IPs
#                        - "no-todo"          Flag TODO/FIXME/HACK comments
#                        - "requires-tests"   Flag files without companion tests
#                        - "max-complexity"    Flag functions over complexity threshold
#                        Custom string values are passed to the reviewer as
#                        natural-language instructions.
#   severity  (required) Severity level for violations: critical, major,
#                        moderate, or minor.
#   message   (optional) Custom message to include in the finding.

custom_rules:
  # - name: "No direct database queries in controllers"
