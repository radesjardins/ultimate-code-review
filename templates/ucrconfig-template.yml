# -----------------------------------------------------------------------------
# Strictness Overrides
# -----------------------------------------------------------------------------
# Override the default strictness level for specific review categories.
# This lets you set higher standards for critical areas (e.g., always review
# security at public-release level) or relax standards for areas that are
# less important to your project (e.g., MVP-level docs requirements).
#
# Categories: security, architecture, performance, accessibility, ux,
#             testing, reliability, documentation, dependency, configuration
#
# Values: mvp, production, public

# strictness_overrides:
#   security: "public"          # Always hold security to the highest standard
#   documentation: "mvp"        # Relaxed documentation requirements
#   accessibility: "public"     # Full WCAG compliance required
#   testing: "production"       # Standard test coverage expectations


# -----------------------------------------------------------------------------
# Review Focus
# -----------------------------------------------------------------------------
# Optional list of categories to emphasize during review. The reviewer will
# spend extra attention on these areas and may apply stricter evaluation.
# Does NOT exclude other categories — it adjusts emphasis.
#
# Useful when you know your project's risk areas or when preparing for
# a specific type of audit (security review, accessibility audit, etc.).

# review_focus:
#   - "security"
#   - "performance"
#   - "accessibility"


# -----------------------------------------------------------------------------
# Defaults
# -----------------------------------------------------------------------------
# Default settings for review runs when not specified via command arguments.
# Command-line arguments always take precedence over these defaults.
#
# scope:      What to review. Options:
#             - "repo"    Full repository (default)
#             - "diff"    Only changed files (requires git)
#             - "commit"  Single commit (requires commit hash argument)
#             - "tree"    Directory subtree (requires path argument)
#
# strictness: How strict the review should be. Options:
#             - "mvp"        Minimum viable — only critical and major issues
#             - "production" Standard — critical, major, and moderate (default)
#             - "public"     Public release — all severity levels matter
#
# engine:     Which AI engine to use. Options:
#             - "claude"  Claude only (default)
#             - "codex"   Codex only
#             - "both"    Both engines with result merging

# defaults:
#   scope: "repo"
#   strictness: "production"
#   engine: "claude"


# -----------------------------------------------------------------------------
# History
# -----------------------------------------------------------------------------
# Configuration for report history tracking and comparison.
#
# directory:     Where to store report history files. Relative to repo root.
# max_reports:   Maximum number of historical reports to retain.
# auto_compare:  Automatically compare against the most recent previous report.

# history:
#   directory: ".ucr-reports"
#   max_reports: 20
#   auto_compare: true


# -----------------------------------------------------------------------------
# Output
# -----------------------------------------------------------------------------
# Control what output files are generated.
#
# markdown:  Generate the human-readable Markdown report (default: true).
# json:      Generate the machine-readable JSON companion file (default: true).
# inline:    Print findings inline in the terminal during review (default: true).

# output:
#   markdown: true
#   json: true
#   inline: true
